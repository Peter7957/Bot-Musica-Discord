services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: dj-vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${PROTONVPN_USER}
      - OPENVPN_PASSWORD=${PROTONVPN_PASSWORD}
      - SERVER_COUNTRIES=United States
    ports:
      - "8080:8080/tcp"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "https://ipinfo.io/ip"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build: .
    container_name: dj-bot
    restart: unless-stopped
    network_mode: "service:gluetun"
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - DISCORD_GUILD_ID_TEST=${DISCORD_GUILD_ID_TEST}
      - YOUTUBE_REFRESH_TOKEN=${YOUTUBE_REFRESH_TOKEN}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/djbot
      - DB_USER=${DB_USER:-djbot}
      - DB_PASSWORD=${DB_PASSWORD:-djbotpass}
    depends_on:
      - gluetun
      - db

  db:
    image: postgres:16-alpine
    container_name: dj-postgres
    restart: unless-stopped
    network_mode: "service:gluetun"
    environment:
      - POSTGRES_DB=djbot
      - POSTGRES_USER=${DB_USER:-djbot}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-djbotpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-djbot} -d djbot"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
